<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dash.dex</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #060614; color: white; min-height: 100vh; }
    .header { background: linear-gradient(135deg, #1a1a3e 0%, #0d0d2b 100%); padding: 20px; text-align: center; border-bottom: 1px solid #2d2d6b; }
    .logo { font-size: 2rem; font-weight: 900; background: linear-gradient(90deg, #6366f1, #a855f7, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .subtitle { color: #6366f1; font-size: 13px; margin-top: 4px; }
    .wallet-bar { margin: 16px; background: #0f0f2e; border: 1px solid #2d2d6b; border-radius: 16px; padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; }
    .wallet-info { font-size: 13px; color: #94a3b8; }
    .wallet-address { font-size: 14px; color: #a855f7; font-weight: 600; }
    .btn-connect { background: linear-gradient(135deg, #6366f1, #a855f7); color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: 700; font-size: 14px; }
    .network-badge { background: #1a1a3e; border: 1px solid #6366f1; color: #6366f1; padding: 4px 10px; border-radius: 20px; font-size: 11px; margin-top: 4px; display: inline-block; }
    .tabs { display: flex; gap: 6px; padding: 0 16px; margin-bottom: 16px; overflow-x: auto; }
    .tab { flex: 1; min-width: 70px; padding: 10px 6px; text-align: center; border-radius: 12px; cursor: pointer; font-size: 12px; font-weight: 600; background: #0f0f2e; color: #64748b; border: 1px solid #1e1e4a; transition: all 0.2s; white-space: nowrap; }
    .tab.active { background: linear-gradient(135deg, #6366f1, #a855f7); color: white; border-color: transparent; }
    .card { background: #0f0f2e; border: 1px solid #1e1e4a; border-radius: 20px; padding: 20px; margin: 0 16px; display: none; }
    .card.active { display: block; }
    .card-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
    label { font-size: 12px; color: #64748b; display: block; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    input, select { width: 100%; padding: 14px; margin-bottom: 16px; border-radius: 12px; border: 1px solid #1e1e4a; background: #060614; color: white; font-size: 15px; outline: none; }
    input:focus, select:focus { border-color: #6366f1; }
    select option { background: #0f0f2e; }
    .btn { width: 100%; padding: 16px; border-radius: 14px; border: none; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 4px; transition: opacity 0.2s; }
    .btn:hover { opacity: 0.9; }
    .btn-purple { background: linear-gradient(135deg, #6366f1, #a855f7); color: white; }
    .btn-green { background: linear-gradient(135deg, #059669, #10b981); color: white; }
    .btn-blue { background: linear-gradient(135deg, #0ea5e9, #06b6d4); color: white; }
    .btn-outline { background: transparent; border: 1px solid #6366f1; color: #6366f1; margin-top: 8px; }
    .status-box { margin: 16px; padding: 16px; background: #0f0f2e; border: 1px solid #1e1e4a; border-radius: 16px; text-align: center; color: #64748b; font-size: 14px; line-height: 1.6; }
    .status-box.success { border-color: #059669; color: #34d399; background: #052e16; }
    .status-box.error { border-color: #dc2626; color: #f87171; background: #2d0a0a; }
    .status-box.loading { border-color: #6366f1; color: #a5b4fc; background: #1a1a3e; }
    .divider { border: none; border-top: 1px solid #1e1e4a; margin: 16px 0; }
    .stats-row { display: flex; gap: 10px; margin-bottom: 16px; }
    .stat-box { flex: 1; background: #060614; border: 1px solid #1e1e4a; border-radius: 12px; padding: 12px; text-align: center; }
    .stat-value { font-size: 1.1rem; font-weight: 700; color: #a855f7; }
    .stat-label { font-size: 11px; color: #64748b; margin-top: 2px; }
    .tx-link { color: #6366f1; font-size: 12px; text-decoration: none; word-break: break-all; }
    .chain-swap-icon { text-align: center; font-size: 1.5rem; margin: -8px 0; cursor: pointer; }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">⚡ Dash.dex</div>
    <div class="subtitle">Built on Arc Testnet • Powered by Circle</div>
  </div>

  <div class="wallet-bar">
    <div>
      <div class="wallet-address" id="walletAddress">Not connected</div>
      <div class="wallet-info" id="walletBalance"></div>
      <div class="network-badge" id="networkBadge">Arc Testnet</div>
    </div>
    <button class="btn-connect" onclick="connectWallet()">Connect</button>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('send', this)">💸 Send</button>
    <button class="tab" onclick="switchTab('bridge', this)">🌉 Bridge</button>
    <button class="tab" onclick="switchTab('swap', this)">🔄 Swap</button>
    <button class="tab" onclick="switchTab('tipjar', this)">🫙 Tip Jar</button>
  </div>

  <!-- SEND -->
  <div class="card active" id="tab-send">
    <div class="card-title">💸 Send USDC</div>
    <label>Recipient Address</label>
    <input id="sendTo" placeholder="0x..." />
    <label>Amount (USDC)</label>
    <input id="sendAmount" type="number" placeholder="1.00" />
    <button class="btn btn-purple" onclick="doSend()">Send USDC →</button>
  </div>

  <!-- BRIDGE -->
  <div class="card" id="tab-bridge">
    <div class="card-title">🌉 Bridge USDC</div>
    <div class="stats-row">
      <div class="stat-box">
        <div class="stat-value">~20s</div>
        <div class="stat-label">Bridge Time</div>
      </div>
      <div class="stat-box">
        <div class="stat-value">CCTP</div>
        <div class="stat-label">Protocol</div>
      </div>
      <div class="stat-box">
        <div class="stat-value">0%</div>
        <div class="stat-label">Slippage</div>
      </div>
    </div>
    <label>From Chain</label>
    <select id="bridgeFrom">
      <option value="Ethereum_Sepolia">Ethereum Sepolia</option>
      <option value="Arc_Testnet">Arc Testnet</option>
    </select>
    <div class="chain-swap-icon" onclick="swapChains()">⇅</div>
    <label>To Chain</label>
    <select id="bridgeTo">
      <option value="Arc_Testnet">Arc Testnet</option>
      <option value="Ethereum_Sepolia">Ethereum Sepolia</option>
    </select>
    <label>Amount (USDC)</label>
    <input id="bridgeAmount" type="number" placeholder="0.01" />
    <button class="btn btn-blue" onclick="doBridge()">Bridge USDC →</button>
  </div>

  <!-- SWAP -->
  <div class="card" id="tab-swap">
    <div class="card-title">🔄 Swap Tokens</div>
    <div class="stats-row">
      <div class="stat-box">
        <div class="stat-value" id="swapRate">~0.93</div>
        <div class="stat-label">Rate</div>
      </div>
      <div class="stat-box">
        <div class="stat-value">Arc</div>
        <div class="stat-label">Network</div>
      </div>
      <div class="stat-box">
        <div class="stat-value">Low</div>
        <div class="stat-label">Fees</div>
      </div>
    </div>
    <label>From Token</label>
    <select id="tokenIn" onchange="updateSwapRate()">
      <option value="USDC">USDC</option>
      <option value="EURC">EURC</option>
    </select>
    <label>To Token</label>
    <select id="tokenOut" onchange="updateSwapRate()">
      <option value="EURC">EURC</option>
      <option value="USDC">USDC</option>
    </select>
    <label>Amount</label>
    <input id="swapAmount" type="number" placeholder="0.01" oninput="updateSwapRate()" />
    <label>You will receive (approx)</label>
    <input id="swapReceive" placeholder="0.00" readonly style="color:#a855f7" />
    <button class="btn btn-green" onclick="doSwap()">Swap Tokens →</button>
  </div>

  <!-- TIP JAR -->
  <div class="card" id="tab-tipjar">
    <div class="card-title">🫙 Tip Jar</div>
    <div class="stats-row">
      <div class="stat-box">
        <div class="stat-value" id="jarBalance">0</div>
        <div class="stat-label">USDC Balance</div>
      </div>
      <div class="stat-box">
        <div class="stat-value" id="jarTips">0</div>
        <div class="stat-label">Total Tips</div>
      </div>
    </div>
    <label>Tip Amount (USDC)</label>
    <input id="tipAmount" type="number" placeholder="1.00" />
    <label>Message</label>
    <input id="tipMessage" placeholder="Great work! 🚀" />
    <button class="btn btn-purple" onclick="sendTip()">Send Tip 💸</button>
    <button class="btn btn-outline" onclick="checkBalance()">Check Balance</button>
    <button class="btn btn-green" onclick="withdraw()">Withdraw (Owner)</button>
  </div>

  <div class="status-box" id="status">Connect your wallet to get started.</div>

  <script>
    const TIPJAR_ADDRESS = "0x489E68cD48156f82BD9d24bD307c678fcCA27d0E";
    const USDC_ADDRESS = "0x3600000000000000000000000000000000000000";
    const ARC_RPC = "https://rpc.testnet.arc.network";
    const ARC_CHAIN_ID = 5042002;

    const TIPJAR_ABI = [
      "function tip(uint256 amount, string memory message) public",
      "function getBalance() public view returns (uint256)",
      "function withdraw() public",
      "function totalTipsReceived() public view returns (uint256)"
    ];
    const USDC_ABI = [
      "function approve(address spender, uint256 amount) public returns (bool)",
      "function balanceOf(address account) public view returns (uint256)"
    ];

    let provider, signer, tipJar, usdcContract;

    async function connectWallet() {
      try {
        if (!window.ethereum) { setStatus("No wallet found. Use MetaMask browser.", "error"); return; }
        provider = new ethers.providers.Web3Provider(window.ethereum);
        await provider.send("eth_requestAccounts", []);

        const network = await provider.getNetwork();
        if (network.chainId !== ARC_CHAIN_ID) {
          setStatus("Switching to Arc Testnet...", "loading");
          try {
            await window.ethereum.request({
              method: "wallet_switchEthereumChain",
              params: [{ chainId: "0x" + ARC_CHAIN_ID.toString(16) }],
            });
          } catch (e) {
            await window.ethereum.request({
              method: "wallet_addEthereumChain",
              params: [{
                chainId: "0x" + ARC_CHAIN_ID.toString(16),
                chainName: "Arc Testnet",
                nativeCurrency: { name: "USDC", symbol: "USDC", decimals: 6 },
                rpcUrls: [ARC_RPC],
                blockExplorerUrls: ["https://testnet.arcscan.app"]
              }]
            });
          }
          provider = new ethers.providers.Web3Provider(window.ethereum);
        }

        signer = provider.getSigner();
        tipJar = new ethers.Contract(TIPJAR_ADDRESS, TIPJAR_ABI, signer);
        usdcContract = new ethers.Contract(USDC_ADDRESS, USDC_ABI, signer);

        const address = await signer.getAddress();
        const usdcBal = await usdcContract.balanceOf(address);
        document.getElementById("walletAddress").innerText = address.slice(0,6) + "..." + address.slice(-4);
        document.getElementById("walletBalance").innerText = ethers.utils.formatUnits(usdcBal, 6) + " USDC";
        document.getElementById("networkBadge").innerText = "✅ Arc Testnet";
        setStatus("✅ Wallet connected! Ready to use Dash.dex.", "success");
        refreshJarStats();
      } catch(e) { setStatus("❌ " + e.message, "error"); }
    }

    function switchTab(tab, el) {
      document.querySelectorAll(".card").forEach(c => c.classList.remove("active"));
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
      document.getElementById("tab-" + tab).classList.add("active");
      el.classList.add("active");
    }

    function swapChains() {
      const from = document.getElementById("bridgeFrom");
      const to = document.getElementById("bridgeTo");
      const temp = from.value;
      from.value = to.value;
      to.value = temp;
    }

    function updateSwapRate() {
      const amount = parseFloat(document.getElementById("swapAmount").value) || 0;
      const tokenIn = document.getElementById("tokenIn").value;
      const rate = tokenIn === "USDC" ? 0.9268 : 1.079;
      document.getElementById("swapReceive").value = (amount * rate).toFixed(4);
      document.getElementById("swapRate").innerText = rate.toFixed(4);
    }

    async function doSend() {
      try {
        if (!signer) { setStatus("Connect wallet first!", "error"); return; }
        const to = document.getElementById("sendTo").value;
        const amount = document.getElementById("sendAmount").value;
        if (!to || !amount) { setStatus("Fill in all fields!", "error"); return; }
        setStatus("Sending " + amount + " USDC...", "loading");
        const parsed = ethers.utils.parseUnits(amount, 6);
        const approveTx = await usdcContract.approve(to, parsed);
        await approveTx.wait();
        setStatus("✅ Approved! Sending...", "loading");
        const tx = await usdcContract.transfer(to, parsed);
        await tx.wait();
        setStatus("✅ Sent " + amount + " USDC!\nTX: " + tx.hash, "success");
      } catch(e) { setStatus("❌ " + e.message, "error"); }
    }

    async function doBridge() {
      setStatus("🌉 Bridge requires signing into Circle Console.\nVisit: https://dashdex-backend-production.up.railway.app/bridge", "loading");
    }

    async function doSwap() {
      setStatus("🔄 Swap requires a Kit Key from Circle Console.\nVisit: https://console.circle.com to get your free key.", "loading");
    }

    async function sendTip() {
      try {
        if (!signer) { setStatus("Connect wallet first!", "error"); return; }
        const amount = document.getElementById("tipAmount").value;
        const message = document.getElementById("tipMessage").value;
        if (!amount) { setStatus("Enter a tip amount!", "error"); return; }
        const parsed = ethers.utils.parseUnits(amount, 6);
        setStatus("Step 1/2: Approving USDC...", "loading");
        const approveTx = await usdcContract.approve(TIPJAR_ADDRESS, parsed);
        await approveTx.wait();
        setStatus("Step 2/2: Sending tip...", "loading");
        const tx = await tipJar.tip(parsed, message);
        await tx.wait();
        setStatus("✅ Tip of " + amount + " USDC sent!\nMessage: " + message, "success");
        refreshJarStats();
      } catch(e) { setStatus("❌ " + e.message, "error"); }
    }

    async function checkBalance() {
      try {
        if (!signer) { setStatus("Connect wallet first!", "error"); return; }
        const bal = await tipJar.getBalance();
        const formatted = ethers.utils.formatUnits(bal, 6);
        setStatus("🫙 Jar balance: " + formatted + " USDC", "success");
        document.getElementById("jarBalance").innerText = formatted;
      } catch(e) { setStatus("❌ " + e.message, "error"); }
    }

    async function withdraw() {
      try {
        if (!signer) { setStatus("Connect wallet first!", "error"); return; }
        setStatus("Withdrawing...", "loading");
        const tx = await tipJar.withdraw();
        await tx.wait();
        setStatus("✅ Withdrawn successfully!", "success");
        refreshJarStats();
      } catch(e) { setStatus("❌ " + e.message, "error"); }
    }

    async function refreshJarStats() {
      try {
        const bal = await tipJar.getBalance();
        const total = await tipJar.totalTipsReceived();
        document.getElementById("jarBalance").innerText = ethers.utils.formatUnits(bal, 6);
        document.getElementById("jarTips").innerText = ethers.utils.formatUnits(total, 6);
      } catch(e) {}
    }

    function setStatus(msg, type) {
      const el = document.getElementById("status");
      el.innerText = msg;
      el.className = "status-box " + (type || "");
    }
  </script>
</body>
</html>
<script>
// Override bridge and swap with real backend
async function doBridge() {
  try {
    const fromChain = document.getElementById("bridgeFrom").value;
    const toChain = document.getElementById("bridgeTo").value;
    const amount = document.getElementById("bridgeAmount").value;
    if (!amount) { setStatus("Enter an amount!", "error"); return; }
    setStatus("🌉 Bridging " + amount + " USDC...", "loading");
    const res = await fetch("https://dashdex-backend-production.up.railway.app/bridge", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ fromChain, toChain, amount })
    });
    const data = await res.json();
    if (data.success) {
      setStatus("✅ Bridge successful! State: " + data.state, "success");
    } else {
      setStatus("❌ " + data.error, "error");
    }
  } catch(e) { setStatus("❌ " + e.message, "error"); }
}

async function doSwap() {
  try {
    const tokenIn = document.getElementById("tokenIn").value;
    const tokenOut = document.getElementById("tokenOut").value;
    const amountIn = document.getElementById("swapAmount").value;
    if (!amountIn) { setStatus("Enter an amount!", "error"); return; }
    setStatus("🔄 Swapping " + amountIn + " " + tokenIn + "...", "loading");
    const res = await fetch("https://dashdex-backend-production.up.railway.app/swap", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ tokenIn, tokenOut, amountIn })
    });
    const data = await res.json();
    if (data.success) {
      setStatus("✅ Swap successful!\nReceived: " + data.amountOut + " " + tokenOut, "success");
    } else {
      setStatus("❌ " + data.error, "error");
    }
  } catch(e) { setStatus("❌ " + e.message, "error"); }
}
</script>
