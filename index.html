<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dash.dex</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #0f172a; color: white; min-height: 100vh; padding: 20px; }
    .container { max-width: 480px; margin: 0 auto; padding-top: 20px; }
    h1 { text-align: center; font-size: 1.8rem; margin-bottom: 4px; }
    .subtitle { text-align: center; color: #94a3b8; margin-bottom: 24px; font-size: 14px; }
    .wallet-bar { background: #1e293b; border-radius: 12px; padding: 14px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
    .wallet-bar button { background: #6366f1; color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 14px; }
    .balance { font-size: 13px; color: #94a3b8; }
    .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
    .tab { flex: 1; padding: 10px; text-align: center; border-radius: 8px; cursor: pointer; font-size: 14px; background: #1e293b; color: #94a3b8; border: none; }
    .tab.active { background: #6366f1; color: white; }
    .card { background: #1e293b; border-radius: 16px; padding: 20px; display: none; }
    .card.active { display: block; }
    h3 { margin-bottom: 16px; color: #e2e8f0; }
    input, select { width: 100%; padding: 12px; margin: 6px 0 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; font-size: 15px; }
    .btn { width: 100%; padding: 14px; border-radius: 8px; border: none; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 4px; }
    .btn-purple { background: #6366f1; color: white; }
    .btn-green { background: #059669; color: white; }
    .btn-blue { background: #0ea5e9; color: white; }
    #status { margin-top: 20px; padding: 14px; background: #1e293b; border-radius: 12px; text-align: center; color: #94a3b8; line-height: 1.6; font-size: 14px; }
    .success { color: #34d399 !important; }
    .error { color: #f87171 !important; }
    label { font-size: 13px; color: #94a3b8; }
  </style>
</head>
<body>
  <div class="container">
    <h1>⚡ Dash.dex</h1>
    <p class="subtitle">Your personal DEX on Arc Testnet</p>

    <div class="wallet-bar">
      <div>
        <div id="walletAddress" class="balance">Not connected</div>
        <div id="walletBalance" class="balance"></div>
      </div>
      <button onclick="connectWallet()">Connect</button>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('send')">💸 Send</button>
      <button class="tab" onclick="switchTab('bridge')">🌉 Bridge</button>
      <button class="tab" onclick="switchTab('swap')">🔄 Swap</button>
      <button class="tab" onclick="switchTab('tipjar')">🫙 Tip Jar</button>
    </div>

    <!-- SEND -->
    <div class="card active" id="tab-send">
      <h3>💸 Send USDC</h3>
      <label>Recipient Address</label>
      <input id="sendTo" placeholder="0x..." />
      <label>Amount (USDC)</label>
      <input id="sendAmount" type="number" placeholder="1.00" />
      <button class="btn btn-purple" onclick="doSend()">Send USDC</button>
    </div>

    <!-- BRIDGE -->
    <div class="card" id="tab-bridge">
      <h3>🌉 Bridge USDC</h3>
      <label>From Chain</label>
      <select id="bridgeFrom">
        <option value="Ethereum_Sepolia">Ethereum Sepolia</option>
        <option value="Arc_Testnet">Arc Testnet</option>
      </select>
      <label>To Chain</label>
      <select id="bridgeTo">
        <option value="Arc_Testnet">Arc Testnet</option>
        <option value="Ethereum_Sepolia">Ethereum Sepolia</option>
      </select>
      <label>Amount (USDC)</label>
      <input id="bridgeAmount" type="number" placeholder="0.01" />
      <button class="btn btn-blue" onclick="doBridge()">Bridge USDC</button>
    </div>

    <!-- SWAP -->
    <div class="card" id="tab-swap">
      <h3>🔄 Swap Tokens</h3>
      <label>From Token</label>
      <select id="tokenIn">
        <option value="USDC">USDC</option>
        <option value="EURC">EURC</option>
      </select>
      <label>To Token</label>
      <select id="tokenOut">
        <option value="EURC">EURC</option>
        <option value="USDC">USDC</option>
      </select>
      <label>Amount</label>
      <input id="swapAmount" type="number" placeholder="0.01" />
      <button class="btn btn-green" onclick="doSwap()">Swap Tokens</button>
    </div>

    <!-- TIP JAR -->
    <div class="card" id="tab-tipjar">
      <h3>🫙 Tip Jar</h3>
      <label>Tip Amount (USDC)</label>
      <input id="tipAmount" type="number" placeholder="1.00" />
      <label>Message</label>
      <input id="tipMessage" placeholder="Great work!" />
      <button class="btn btn-purple" onclick="sendTip()">Send Tip</button>
      <button class="btn btn-blue" style="margin-top:8px" onclick="checkBalance()">Check Balance</button>
      <button class="btn btn-green" style="margin-top:8px" onclick="withdraw()">Withdraw</button>
    </div>

    <div id="status">Connect your wallet to get started.</div>
  </div>

  <script>
    const TIPJAR_ADDRESS = "0x489E68cD48156f82BD9d24bD307c678fcCA27d0E";
    const USDC_ADDRESS = "0x3600000000000000000000000000000000000000";
    const KIT_KEY = "REPLACE_WITH_YOUR_KIT_KEY";

    const TIPJAR_ABI = [
      "function tip(uint256 amount, string memory message) public",
      "function getBalance() public view returns (uint256)",
      "function withdraw() public"
    ];
    const USDC_ABI = [
      "function approve(address spender, uint256 amount) public returns (bool)"
    ];

    let provider, signer, tipJar, usdc;

    async function connectWallet() {
      if (!window.ethereum) { setStatus("No wallet found. Use MetaMask browser.", "error"); return; }
      provider = new ethers.providers.Web3Provider(window.ethereum);
      await provider.send("eth_requestAccounts", []);
      signer = provider.getSigner();
      tipJar = new ethers.Contract(TIPJAR_ADDRESS, TIPJAR_ABI, signer);
      usdc = new ethers.Contract(USDC_ADDRESS, USDC_ABI, signer);
      const address = await signer.getAddress();
      const balance = await provider.getBalance(address);
      document.getElementById("walletAddress").innerText = address.slice(0,6) + "..." + address.slice(-4);
      document.getElementById("walletBalance").innerText = "Balance: " + ethers.utils.formatUnits(balance, 6) + " USDC";
      setStatus("✅ Wallet connected!", "success");
    }

    function switchTab(tab) {
      document.querySelectorAll(".card").forEach(c => c.classList.remove("active"));
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
      document.getElementById("tab-" + tab).classList.add("active");
      event.target.classList.add("active");
    }

    async function doSend() {
      try {
        setStatus("Preparing send...");
        const to = document.getElementById("sendTo").value;
        const amount = document.getElementById("sendAmount").value;
        setStatus("Sending " + amount + " USDC to " + to.slice(0,6) + "...");
        const tx = await signer.sendTransaction({ to, value: ethers.utils.parseUnits(amount, 6) });
        await tx.wait();
        setStatus("✅ Sent " + amount + " USDC! TX: " + tx.hash.slice(0,10) + "...", "success");
      } catch(e) { setStatus("❌ " + e.message, "error"); }
    }

    async function doBridge() {
      setStatus("🌉 Bridging requires App Kit backend. Coming soon!", "error");
    }

    async function doSwap() {
      setStatus("🔄 Swapping requires App Kit backend. Coming soon!", "error");
    }

    async function sendTip() {
      try {
        const amount = document.getElementById("tipAmount").value;
        const message = document.getElementById("tipMessage").value;
        const parsed = ethers.utils.parseUnits(amount, 6);
        setStatus("Step 1/2: Approving USDC...");
        const approveTx = await usdc.approve(TIPJAR_ADDRESS, parsed);
        await approveTx.wait();
        setStatus("Step 2/2: Sending tip...");
        const tx = await tipJar.tip(parsed, message);
        await tx.wait();
        setStatus("✅ Tip of " + amount + " USDC sent! Message: " + message, "success");
      } catch(e) { setStatus("❌ " + e.message, "error"); }
    }

    async function checkBalance() {
      try {
        const bal = await tipJar.getBalance();
        setStatus("🫙 Jar balance: " + ethers.utils.formatUnits(bal, 6) + " USDC", "success");
      } catch(e) { setStatus("❌ " + e.message, "error"); }
    }

    async function withdraw() {
      try {
        setStatus("Withdrawing...");
        const tx = await tipJar.withdraw();
        await tx.wait();
        setStatus("✅ Withdrawn successfully!", "success");
      } catch(e) { setStatus("❌ " + e.message, "error"); }
    }

    function setStatus(msg, type) {
      const el = document.getElementById("status");
      el.innerText = msg;
      el.className = type || "";
    }
  </script>
</body>
</html>
